enable_rain_delay:
  description: Enable rain delay for a zone
  fields:
    entity_id:
      description: Zone
      example: "valve.backyard_zone"
    hours:
      description: Number of hours of rain delay
      example: 24

disable_rain_delay:
  description: Disable rain delay for a zone
  fields:
    entity_id:
      description: Zone
      example: "valve.backyard_zone"

start_watering:
  description: Start watering a zone
  fields:
    entity_id:
      description: Zone
      example: "valve.backyard_zone"
    minutes:
      description: Number of minutes to water the zone
      example: 15

stop_watering:
  description: Stop watering a zone
  fields:
    entity_id:
      description: Zone
      example: "valve.backyard_zone"

set_manual_preset_runtime:
  description: Set the manual preset runtime for a device entity
  fields:
    entity_id:
      description: Zone
      example: "valve.backyard_zone"
    minutes:
      description: Number of minutes to set the preset runtime
      example: 15

set_smart_watering_soil_moisture:
  description: Set the smart watering soil moisture level for a zone
  fields:
    entity_id:
      description: Zone
      example: "valve.backyard_zone"
    percentage:
      description: Moisture level between 0 - 100 (percent)
      example: 50

start_program:
  description: Begin watering a program
  fields:
    entity_id:
      description: Program
      example: "valve.backyard_zone"

update_program:
  description: Update a program's configuration. Provide at least one of start_times, frequency or budget
  fields:
    entity_id:
      description: Program switch
      example: "switch.front_yard_program"
    start_times:
      description: List of watering start times in HH:MM format
      example: '["06:00", "18:00"]'
    frequency:
      description: Frequency configuration. `type` is required (known values: days, interval)
      example: '{"type": "days", "days": [1, 3, 5], "interval": 1, "interval_hours": 0}'
    budget:
      description: Watering budget as a percentage (0-200). Scales run times up or down
      example: 50
